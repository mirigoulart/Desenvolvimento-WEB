<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70" fill="none">
  <!-- Ícone flor/diamante rosé -->
  <g transform="translate(8, 10)">
    <!-- Pétalas -->
    <ellipse cx="25" cy="15" rx="6" ry="12" fill="#C8607A" opacity="0.85" transform="rotate(-30 25 25)"/>
    <ellipse cx="25" cy="15" rx="6" ry="12" fill="#C9A96E" opacity="0.75" transform="rotate(30 25 25)"/>
    <ellipse cx="13" cy="28" rx="6" ry="12" fill="#C8607A" opacity="0.70" transform="rotate(90 25 25)"/>
    <ellipse cx="37" cy="28" rx="6" ry="12" fill="#C9A96E" opacity="0.80" transform="rotate(-90 25 25)"/>
    <!-- Centro -->
    <circle cx="25" cy="25" r="7" fill="#A04060"/>
    <circle cx="25" cy="25" r="4" fill="#E8A0B0"/>
  </g>

  <!-- Texto Amour -->
  <text x="62" y="36" font-family="'Playfair Display', Georgia, serif" font-size="26" font-weight="700" font-style="italic" fill="#2D1B25" letter-spacing="-0.5">Amour</text>

  <!-- Texto Beauty -->
  <text x="62" y="56" font-family="'Montserrat', system-ui, sans-serif" font-size="13" font-weight="800" fill="#C9A96E" letter-spacing="5">BEAUTY</text>

  <!-- Linha decorativa -->
  <line x1="62" y1="40" x2="210" y2="40" stroke="#EDD8DF" stroke-width="0.8"/>
</svg>
